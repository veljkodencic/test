name: CI/CD — veljko-infra

on:
  #  push:
  #    branches: [ main ]
  #pull_request:
  # branches: [ main ]
  workflow_dispatch:  # manual trigger only — use Run workflow button in GitHub Actions

env:
  AWS_REGION:      "us-east-1"
  ECR_REGISTRY:    "139592264087.dkr.ecr.us-east-1.amazonaws.com"
  ECR_REPOSITORY:  "veljko-demo-app"
  EKS_CLUSTER:     "veljko-eks-dev"
  TF_STATE_BUCKET: "veljko-tfstate-139592264087"
  TF_WORKING_DIR:  "terraform/environments/dev"

jobs:
  # ── Build & push Docker image ──────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push
        id: image
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | head -c7)
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          docker build -t $IMAGE_URI ./app

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker push $IMAGE_URI
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              docker tag $IMAGE_URI ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
              docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            fi
          fi

          echo "uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Terraform plan ─────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=veljko/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password:            ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_grafana_admin_password: ${{ secrets.TF_VAR_GRAFANA_PASSWORD }}
          TF_VAR_app_image:              "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
        run: terraform plan -no-color 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n...(truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── Terraform apply (main branch only) ────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build, terraform-plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up failed Helm releases
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }} 2>/dev/null || true
          for release in kube-prometheus-stack aws-load-balancer-controller fluent-bit; do
            STATUS=$(helm status $release -n monitoring 2>/dev/null | grep "STATUS:" | awk '{print $2}' || echo "")
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "pending-install" ]; then
              echo "Removing failed release: $release"
              helm uninstall $release -n monitoring 2>/dev/null || true
            fi
          done
          STATUS=$(helm status aws-load-balancer-controller -n kube-system 2>/dev/null | grep "STATUS:" | awk '{print $2}' || echo "")
          if [ "$STATUS" = "failed" ] || [ "$STATUS" = "pending-install" ]; then
            helm uninstall aws-load-balancer-controller -n kube-system 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Delete leftover CloudWatch log groups
        run: |
          for lg in /aws/eks/veljko-eks-dev/cluster /eks/veljko-eks-dev/app; do
            aws logs delete-log-group --log-group-name "$lg" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          done

      - name: Import existing EKS access entries into Terraform state
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # If access entry already exists (e.g. created manually), import it
          # so Terraform doesn't try to create it again and fail with 409.
          USER_ARN="arn:aws:iam::139592264087:user/veljko-admin"
          CLUSTER="veljko-eks-dev"
          EXISTS=$(aws eks describe-access-entry             --cluster-name $CLUSTER             --principal-arn $USER_ARN             --region ${{ env.AWS_REGION }}             --query "accessEntry.principalArn"             --output text 2>/dev/null || echo "")
          if [ -n "$EXISTS" ]; then
            echo "Access entry exists, importing into Terraform state..."
            terraform import               "module.eks.aws_eks_access_entry.admin_users["$USER_ARN"]"               "${CLUSTER}:${USER_ARN}" 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=veljko/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_db_password:            ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_grafana_admin_password: ${{ secrets.TF_VAR_GRAFANA_PASSWORD }}
          TF_VAR_app_image:              "${{ needs.build.outputs.image_uri }}"
        run: terraform apply -auto-approve

  # ── Smoke test ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Apply monitoring resources
        run: |
          kubectl apply -f k8s/monitoring/service-monitor.yaml
          kubectl apply -f k8s/monitoring/grafana-dashboard.yaml
          kubectl label service demo-app -n demo app=demo-app --overwrite 2>/dev/null || true

      - name: Wait for rollout
        run: kubectl rollout status deployment/demo-app -n demo --timeout=300s || true

      - name: Hit /health endpoint
        run: |
          ALB=$(kubectl get ingress demo-app -n demo \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Testing http://$ALB/health"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB/health || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "Smoke test passed"; exit 0; fi
            sleep 15
          done
          echo "Smoke test failed" && exit 1
