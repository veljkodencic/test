apiVersion: v1
kind: ConfigMap
metadata:
  name: veljko-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  veljko-app.json: |
    {
      "title": "veljko — Demo App",
      "uid": "veljko-demo",
      "refresh": "30s",
      "panels": [
        {
          "id": 1, "title": "Request Rate (req/s)", "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "sum(rate(http_requests_total[5m]))" }]
        },
        {
          "id": 2, "title": "Error Rate (%)", "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m])) * 100" }]
        },
        {
          "id": 3, "title": "p95 Latency (s)", "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "histogram_quantile(0.95, sum by(le) (rate(http_request_duration_seconds_bucket[5m])))" }]
        },
        {
          "id": 4, "title": "Items in DB", "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "app_items_total" }]
        }
      ]
    }
